# featured saxophone moments, grouped by gig
#
# top-level fields:
#   venue   - where it was
#   date    - YYYY-MM-DD (used for sorting; only month + year are displayed)
#   meta    - small subtitle line (lineup, backstory, anything; optional)
#   clips   - list of moments from that gig
#
# clip fields:
#   video   - youtube video id (the part after "v=" or after "youtu.be/")
#   start   - seconds into the video where the clip starts
#   end     - seconds where the clip ends (optional)
#   title   - tune name + what you're doing
#   note    - small italic line under the title (optional)

